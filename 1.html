<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>终端监控 - 神经网络示波器</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* 重置与全局暗黑工业风格 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Consolas', 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部状态栏 */
        .top-bar {
            background-color: #111;
            border-bottom: 2px solid #333;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            text-transform: uppercase;
        }
        .sys-title { color: #a0a0a0; font-weight: bold; letter-spacing: 2px; }
        .status-indicator { display: flex; align-items: center; gap: 10px; }
        .led {
            width: 12px; height: 12px; border-radius: 50%;
            background-color: #ff3333;
            box-shadow: 0 0 8px #ff3333;
            transition: background-color 0.3s;
        }
        .led.online { background-color: #00ff00; box-shadow: 0 0 10px #00ff00; }

        /* 核心布局 */
        .main-container {
            display: flex;
            flex: 1;
            padding: 15px;
            gap: 15px;
        }

        /* 左侧示波器区域 */
        .oscilloscope-panel {
            flex: 3;
            background-color: #0a0a0a;
            border: 1px solid #333;
            position: relative;
            border-radius: 4px;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }

        /* 右侧遥测数据面板 */
        .telemetry-panel {
            flex: 1;
            background-color: #111;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 仪表盘数据块样式 */
        .data-block {
            background: #1a1a1a;
            border-left: 4px solid #555;
            padding: 15px;
            border-radius: 2px;
        }
        .data-block.ch1 { border-left-color: #00ffff; }
        .data-block.ch2 { border-left-color: #ff00ff; }
        .data-block.alert { border-left-color: #ffaa00; }
        .data-block.latency { border-left-color: #44ff88; }

        .data-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }
        .data-value {
            font-size: 32px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
        }
        .data-value.ch1-text { color: #00ffff; text-shadow: 0 0 8px rgba(0,255,255,0.4); }
        .data-value.ch2-text { color: #ff00ff; text-shadow: 0 0 8px rgba(255,0,255,0.4); }
        .data-value.alert-text { color: #ffaa00; }
        .data-value.latency-text { color: #44ff88; }

        /* D3.js SVG 样式 */
        svg { width: 100%; height: 100%; display: block; }

        /* 工业示波器网格 */
        .grid line { stroke: #1a1a1a; stroke-width: 1px; }
        .grid path { stroke-width: 0; }
        .axis text { fill: #555; font-size: 10px; font-family: monospace; }
        .axis path, .axis line { stroke: #333; }

        /* 中心线（以1为中心） */
        .center-line {
            stroke: #444;
            stroke-width: 1px;
            stroke-dasharray: 4,4;
        }

        /* 波形线条样式 */
        .line-ch1 {
            fill: none;
            stroke: #00ffff;
            stroke-width: 2px;
            filter: drop-shadow(0 0 4px rgba(0,255,255,0.8));
        }
        .line-ch2 {
            fill: none;
            stroke: #ff00ff;
            stroke-width: 2px;
            stroke-dasharray: 4,4;
            filter: drop-shadow(0 0 4px rgba(255,0,255,0.8));
        }

        /* 实时数值指示器 */
        .indicator-text {
            font-size: 11px;
            font-family: 'Consolas', monospace;
            fill: #888;
        }
        .indicator-value {
            font-weight: bold;
        }
        .indicator-value.ch1 { fill: #00ffff; }
        .indicator-value.ch2 { fill: #ff00ff; }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            .telemetry-panel {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .data-block {
                flex: 1;
                min-width: 120px;
            }
            .data-value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="sys-title">Neural Oscilloscope // SCADA Terminal</div>
        <div class="status-indicator">
            <span id="model-badge" style="color: #888;">MODEL: [WAITING]</span>
            <span>|</span>
            <span id="status-text" style="color: #ff3333;">SYS OFFLINE</span>
            <div id="led-bulb" class="led"></div>
        </div>
    </div>

    <div class="main-container">
        <div class="oscilloscope-panel" id="chart-container">
        </div>

        <div class="telemetry-panel">
            <div class="data-block ch1">
                <div class="data-label">CH1: 真实价格 (Actual)</div>
                <div class="data-value ch1-text" id="val-ch1">0.00000</div>
            </div>

            <div class="data-block ch2">
                <div class="data-label">CH2: 神经网络预测 (Predict)</div>
                <div class="data-value ch2-text" id="val-ch2">0.00000</div>
            </div>

            <div class="data-block alert">
                <div class="data-label">Δ 实时绝对误差 (Loss)</div>
                <div class="data-value alert-text" id="val-error">0.00000</div>
            </div>

            <div class="data-block latency">
                <div class="data-label">SYS 链路延迟 (Latency)</div>
                <div class="data-value latency-text" id="val-latency">0 ms</div>
            </div>
        </div>
    </div>

<script>
    // ---------------------------------------------------------
    // 1. 初始化 D3 画布与自适应
    // ---------------------------------------------------------
    const container = document.getElementById("chart-container");
    const MAX_POINTS = 200;
    let dataBuffer = [];

    const width = container.clientWidth;
    const height = container.clientHeight;
    const margin = {top: 30, right: 30, bottom: 30, left: 50};
    const innerWidth = width - margin.left - margin.right;
    const innerHeight = height - margin.top - margin.bottom;

    const svg = d3.select("#chart-container").append("svg")
        .attr("width", width)
        .attr("height", height);

    const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

    // 比例尺 - Y轴以1为中心
    const xScale = d3.scaleLinear().domain([0, MAX_POINTS - 1]).range([0, innerWidth]);
    // 初始Y轴范围，以1为中心
    const INITIAL_Y_RANGE = 0.5;
    const CENTER_VALUE = 1.0;  // 中心值设为1
    const yScale = d3.scaleLinear().domain([CENTER_VALUE - INITIAL_Y_RANGE, CENTER_VALUE + INITIAL_Y_RANGE]).range([innerHeight, 0]);

    // 绘制暗黑工业网格
    let gridGroup = g.append("g").attr("class", "grid");
    let axisGroup = g.append("g").attr("class", "axis");

    // 绘制中心线（以1为中心）
    let centerLine = g.append("line")
        .attr("class", "center-line")
        .attr("x1", 0)
        .attr("x2", innerWidth)
        .attr("y1", yScale(CENTER_VALUE))
        .attr("y2", yScale(CENTER_VALUE));

    // 定义线条生成器
    const lineCh1 = d3.line()
        .x((d, i) => xScale(i))
        .y(d => yScale(d.ch1_actual !== undefined ? d.ch1_actual : CENTER_VALUE));

    const lineCh2 = d3.line()
        .x((d, i) => xScale(i))
        .y(d => yScale(d.ch2_predict !== undefined ? d.ch2_predict : CENTER_VALUE));

    // 创建路径
    const pathCh1 = g.append("path").attr("class", "line-ch1");
    const pathCh2 = g.append("path").attr("class", "line-ch2");

    // 添加实时数值指示器
    const indicatorGroup = g.append("g").attr("transform", `translate(${innerWidth - 150}, 10)`);
    indicatorGroup.append("text")
        .attr("class", "indicator-text")
        .attr("y", 0)
        .text("CH1: ")
        .append("tspan")
        .attr("class", "indicator-value ch1")
        .attr("id", "indicator-ch1")
        .text("0.00000");

    indicatorGroup.append("text")
        .attr("class", "indicator-text")
        .attr("y", 18)
        .text("CH2: ")
        .append("tspan")
        .attr("class", "indicator-value ch2")
        .attr("id", "indicator-ch2")
        .text("0.00000");

    // 添加图例
    const legendGroup = g.append("g").attr("transform", `translate(10, 10)`);
    legendGroup.append("line")
        .attr("x1", 0).attr("y1", 0)
        .attr("x2", 20).attr("y2", 0)
        .style("stroke", "#00ffff")
        .style("stroke-width", 2);
    legendGroup.append("text")
        .attr("x", 25).attr("y", 4)
        .style("fill", "#888")
        .style("font-size", "10px")
        .text("Actual");

    legendGroup.append("line")
        .attr("x1", 80).attr("y1", 0)
        .attr("x2", 100).attr("y2", 0)
        .style("stroke", "#ff00ff")
        .style("stroke-width", 2)
        .style("stroke-dasharray", "4,4");
    legendGroup.append("text")
        .attr("x", 105).attr("y", 4)
        .style("fill", "#888")
        .style("font-size", "10px")
        .text("Predict");

    // 添加中心值标签
    const centerLabel = g.append("text")
        .attr("x", innerWidth - 10)
        .attr("y", yScale(CENTER_VALUE) - 5)
        .style("fill", "#666")
        .style("font-size", "10px")
        .style("font-family", "monospace")
        .style("text-anchor", "end")
        .text(`center: ${CENTER_VALUE.toFixed(2)}`);

    // 更新坐标轴的函数（以1为中心对称）
    function updateAxes(yRange) {
        // 清除旧的轴
        gridGroup.selectAll("*").remove();
        axisGroup.selectAll("*").remove();

        // 计算以1为中心的范围
        const center = CENTER_VALUE;
        const halfRange = Math.max(
            Math.abs(yRange[0] - center),
            Math.abs(yRange[1] - center),
            0.001  // 最小范围
        );

        // 确保范围对称于中心值
        const newMin = center - halfRange;
        const newMax = center + halfRange;
        yScale.domain([newMin, newMax]);

        // 更新中心线位置
        centerLine
            .attr("y1", yScale(CENTER_VALUE))
            .attr("y2", yScale(CENTER_VALUE))
            .attr("x1", 0)
            .attr("x2", innerWidth);

        // 更新中心标签位置
        centerLabel
            .attr("y", yScale(CENTER_VALUE) - 5)
            .text(`center: ${CENTER_VALUE.toFixed(2)}`);

        // 绘制网格
        gridGroup.call(d3.axisLeft(yScale).ticks(10).tickSize(-innerWidth).tickFormat(""));
        gridGroup.append("g")
            .attr("transform", `translate(0,${innerHeight})`)
            .call(d3.axisBottom(xScale).ticks(20).tickSize(-innerHeight).tickFormat(""));

        // 绘制坐标轴
        axisGroup.call(d3.axisLeft(yScale).ticks(5));
    }

    // 初始更新坐标轴
    updateAxes([CENTER_VALUE - INITIAL_Y_RANGE, CENTER_VALUE + INITIAL_Y_RANGE]);

    // 更新Y轴范围的函数（自动计算并保持以1为中心）
    function updateYAxisCentered() {
        if (dataBuffer.length < 10) return;

        // 收集所有数据点的值
        const allValues = [];
        dataBuffer.forEach(d => {
            if (d.ch1_actual !== undefined && isFinite(d.ch1_actual)) allValues.push(d.ch1_actual);
            if (d.ch2_predict !== undefined && isFinite(d.ch2_predict)) allValues.push(d.ch2_predict);
        });

        if (allValues.length === 0) return;

        // 计算数据范围
        let yMin = Math.min(...allValues);
        let yMax = Math.max(...allValues);

        // 计算相对于中心的偏移
        const center = CENTER_VALUE;
        const maxOffset = Math.max(Math.abs(yMin - center), Math.abs(yMax - center));

        // 添加20%的边距
        const padding = Math.max(maxOffset * 0.2, 0.001);
        const newRange = maxOffset + padding;

        // 更新坐标轴（以1为中心对称）
        updateAxes([center - newRange, center + newRange]);
    }

    // 当数据变化时更新图表
    function updateChart() {
        // 更新Y轴（保持以1为中心）
        updateYAxisCentered();

        // 更新波形
        pathCh1.datum(dataBuffer).attr("d", lineCh1);
        pathCh2.datum(dataBuffer).attr("d", lineCh2);
    }

    // ---------------------------------------------------------
    // 2. DOM 元素绑定
    // ---------------------------------------------------------
    const domCh1 = document.getElementById('val-ch1');
    const domCh2 = document.getElementById('val-ch2');
    const domError = document.getElementById('val-error');
    const domLatency = document.getElementById('val-latency');
    const domModelBadge = document.getElementById('model-badge');
    const domStatusText = document.getElementById('status-text');
    const domLed = document.getElementById('led-bulb');
    const domIndicatorCh1 = document.getElementById('indicator-ch1');
    const domIndicatorCh2 = document.getElementById('indicator-ch2');

    // ---------------------------------------------------------
    // 3. WebSocket 数据流
    // ---------------------------------------------------------
    function connectDataStream() {
        const ws = new WebSocket("ws://127.0.0.1:8765");

        ws.onopen = () => {
            domStatusText.textContent = "DATA LINK ACTV";
            domStatusText.style.color = "#00ff00";
            domLed.classList.add("online");
            console.log("[WebSocket] 连接成功");
        };

        ws.onmessage = (event) => {
            try {
                const payload = JSON.parse(event.data);

                domModelBadge.textContent = `MODEL: [ ${payload.model_type} ]`;
                domCh1.textContent = payload.ch1_actual.toFixed(5);
                domCh2.textContent = payload.ch2_predict.toFixed(5);
                domError.textContent = payload.error_abs.toFixed(5);
                domLatency.textContent = payload.latency_ms.toFixed(1) + " ms";

                domIndicatorCh1.textContent = payload.ch1_actual.toFixed(5);
                domIndicatorCh2.textContent = payload.ch2_predict.toFixed(5);

                dataBuffer.push(payload);
                if (dataBuffer.length > MAX_POINTS) {
                    dataBuffer.shift();
                }

                // 更新图表（Y轴会自动以1为中心）
                updateChart();

            } catch (e) {
                console.error("[WebSocket] 数据解析错误:", e);
            }
        };

        ws.onclose = () => {
            domStatusText.textContent = "SYS OFFLINE";
            domStatusText.style.color = "#ff3333";
            domLed.classList.remove("online");
            console.log("[WebSocket] 连接断开，3秒后重连...");
            setTimeout(connectDataStream, 3000);
        };

        ws.onerror = (error) => {
            console.error("[WebSocket] 连接错误:", error);
        };
    }

    // 启动连接
    connectDataStream();

    // ---------------------------------------------------------
    // 4. 窗口自适应
    // ---------------------------------------------------------
    function resizeChart() {
        const newWidth = container.clientWidth;
        const newHeight = container.clientHeight;

        svg.attr("width", newWidth).attr("height", newHeight);

        const newInnerWidth = newWidth - margin.left - margin.right;
        const newInnerHeight = newHeight - margin.top - margin.bottom;

        xScale.range([0, newInnerWidth]);
        yScale.range([newInnerHeight, 0]);

        // 更新中心线
        centerLine
            .attr("x1", 0)
            .attr("x2", newInnerWidth)
            .attr("y1", yScale(CENTER_VALUE))
            .attr("y2", yScale(CENTER_VALUE));

        // 更新中心标签
        centerLabel
            .attr("x", newInnerWidth - 10)
            .attr("y", yScale(CENTER_VALUE) - 5);

        // 重新绘制
        if (dataBuffer.length > 0) {
            updateChart();
        }
    }

    window.addEventListener('resize', resizeChart);

    if (window.ResizeObserver) {
        const resizeObserver = new ResizeObserver(() => {
            resizeChart();
        });
        resizeObserver.observe(container);
    }

    console.log("[系统] 前端监控面板已初始化 (Y轴以1为中心)");
</script>
</body>
</html>
